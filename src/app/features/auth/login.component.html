<div class="login-page">
  <div class="login-bg">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="#2563EB"/>
            <circle cx="24" cy="18" r="6" fill="white"/>
            <path d="M14 40 C14 30, 34 30, 34 40" stroke="white" stroke-width="3" fill="none"/>
            <line x1="30" y1="12" x2="38" y2="4" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="39" cy="3" r="2" fill="white"/>
          </svg>
        </div>
        <h1 class="login-title">BadmintonHub</h1>
        <p class="login-subtitle">Hệ thống quản lý sân cầu lông</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label class="form-label">Tên đăng nhập</label>
          <div class="input-wrapper" [class.input-error]="showFieldError('username')">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" formControlName="username" placeholder="Nhập tên đăng nhập" autocomplete="username">
          </div>
          @if (showFieldError('username')) {
            <span class="field-error">Vui lòng nhập tên đăng nhập</span>
          }
        </div>

        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <div class="input-wrapper" [class.input-error]="showFieldError('password')">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
            <button type="button" class="toggle-password" (click)="showPassword.set(!showPassword())">
              @if (showPassword()) {
                <app-icon name="visibility_off" [size]="18" />
              } @else {
                <app-icon name="visibility" [size]="18" />
              }
            </button>
          </div>
          @if (showFieldError('password')) {
            <span class="field-error">Vui lòng nhập mật khẩu</span>
          }
        </div>

        @if (loginError()) {
          <div class="error-toast">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span>{{ loginError() }}</span>
          </div>
        }

        <button type="submit" class="login-btn" [disabled]="isLoading()">
          @if (!isLoading()) {
            <span>Đăng nhập</span>
          } @else {
            <span class="loading-spinner"></span>
          }
        </button>
      </form>

      <div class="demo-hint">
        <span class="hint-icon">💡</span>
        <span>Demo: <strong>admin</strong>, <strong>manager</strong>, <strong>cashier</strong> / <strong>admin123</strong></span>
      </div>
    </div>
  </div>
</div>
